# nginx Server-Konfiguration für easyWIRED (STRATO VPS)
#
# Diese Datei zeigt die empfohlene nginx-Konfiguration für /srv/easywired-new/.
# Sie liefert HTTPS-Pflichtumleitung, moderne Security-Header und sinnvolle
# Caching-Strategien für die statische Spiegelung.
#
# Aktivierung:
#   1. Datei nach /etc/nginx/sites-available/easywired.conf kopieren
#   2. Symlink: ln -s /etc/nginx/sites-available/easywired.conf /etc/nginx/sites-enabled/
#   3. nginx -t  (Syntaxprüfung)
#   4. systemctl reload nginx
#
# Voraussetzungen:
#   - Let's-Encrypt-Zertifikat per certbot anlegen:
#       certbot certonly --nginx -d easywired.de -d www.easywired.de
#   - DNS für easywired.de und www.easywired.de zeigt auf 217.154.150.55
#
# Wichtige Härtungs-Punkte (siehe SECURITY_AUDIT.md):
#   • HTTPS-Erzwingung (HSTS)
#   • X-Frame-Options (Clickjacking-Schutz)
#   • X-Content-Type-Options (MIME-Sniffing)
#   • Referrer-Policy
#   • Content-Security-Policy (parallel zu Meta-Tags in HTML)
#   • Permissions-Policy
#   • server_tokens off (verbirgt nginx-Version)

# --- HTTP -> HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name easywired.de www.easywired.de 217.154.150.55;

    # ACME challenge für certbot
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://www.easywired.de$request_uri;
    }
}

# --- HTTPS Haupt-Server ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name easywired.de www.easywired.de;

    # --- Document Root ---
    root /srv/easywired-new;
    index index.html;
    charset utf-8;

    # --- TLS-Konfiguration ---
    ssl_certificate     /etc/letsencrypt/live/easywired.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easywired.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # --- Security Header ---
    server_tokens off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # CSP: erlaubt nur lokale Ressourcen. Inline-Styles und -Scripts werden vom
    # alten Weebly-Template benötigt; img https: bleibt offen für Discord/Habbo-Avatare.
    add_header Content-Security-Policy "default-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self'; connect-src 'self'; font-src 'self' data:; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # --- MIME-Type fix für moderne Schriftarten ---
    location ~* \.(?:woff2?|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # --- Cache-Strategie für Mediendateien ---
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|ico|mp4|webm)$ {
        expires 14d;
        add_header Cache-Control "public";
    }

    # --- CSS/JS leicht kürzer ---
    location ~* \.(?:css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- HTML nie cachen (statische Spiegelung ändert sich gelegentlich) ---
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # --- 404-Seite ---
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # --- Zugriff auf .git, .env etc. blockieren (Defense in Depth) ---
    location ~ /\.(?:git|env|hg|svn) {
        deny all;
        return 404;
    }

    # --- security.txt: well-known Pfad ---
    location = /.well-known/security.txt {
        default_type text/plain;
    }

    # --- Hauptlocation ---
    location / {
        try_files $uri $uri/ =404;
    }

    # --- Kontaktseite explizit blockieren (Migrationsanforderung) ---
    location = /kontakt.html {
        return 410;  # 410 Gone, klarer Signal an Crawler
    }

    # --- Optional: Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff2;
}
